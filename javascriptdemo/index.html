            <div id="result"></div>

        <script>
            //this statement prints text to the screen.
            document.write("Hello World!" + "<br>");
            //create variable
            var value1 = 50;
            var value2 = 60;
            var sum = value1 + value2
            document.write(sum + "<br>");
            //connect two words together, this is called concatenation
            var string1 = "Chocolate";
            var string2 = " Brownie";
            document.write(string1 + string2 + "<br>");
            //select an HTML element by Id and manipulate it
            document.getElementById("result").innerHTML = "What's up";
            document.getElementById("result").innerText = "Hello";
            //select an HTML element by Id and change it's style
            document.getElementById("result").style = "color: red; font-weight:bold; font-size:30px";

            //window.alert("Hey watch out");
            
        </script>
