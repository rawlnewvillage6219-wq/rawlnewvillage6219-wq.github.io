<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Anime Quiz</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h1>Anime Knowledge Quiz</h1>

    <form>

        <!-- Multiple Choice Question 1 -->
        <div class="question">
            <p>1. Who is the main character of Naruto?</p>
            <label><input type="radio" name="q1"> Sasuke Uchiha</label><br>
            <label><input type="radio" name="q1"> Naruto Uzumaki</label><br>
            <label><input type="radio" name="q1"> Kakashi Hatake</label><br>
            <label><input type="radio" name="q1"> Itachi Uchiha</label>
        </div>

        <!-- Multiple Choice Question 2 -->
        <div class="question">
            <p>2. Which anime features Levi Ackermann?</p>
            <label><input type="radio" name="q2"> Bleach</label><br>
            <label><input type="radio" name="q2"> One Punch Man</label><br>
            <label><input type="radio" name="q2"> Dragon Ball</label><br>
            <label><input type="radio" name="q2"> Attack on Titan</label>
        </div>

        <!-- Multiple Answer Question 1 -->
        <div class="question">
            <p>3. Which of the following are members of the Akatsuki? (Select all that apply)</p>
            <label><input type="checkbox" name="q3"> Pain</label><br>

            <label><input type="checkbox" name="q3"> Goku</label><br>
            <label><input type="checkbox" name="q3"> Kisame</label>
        </div>

        <!-- Multiple Answer Question 2 -->
        <div class="question">
            <p>4. In which anime does Satoru Gojo appear in? (Select all that apply)</p>
            <label><input type="checkbox" name="q4"> Jujutsu Kaisen</label><br>
            <label><input type="checkbox" name="q4"> Solo Leveling</label><br>
            <label><input type="checkbox" name="q4"> Demon Slayer</label><br>
            <label><input type="checkbox" name="q4"> Jujutsu Kaisen zero</label>
        </div><br>

        <button type="submit">Submit Quiz</button>

    </form>
</div>

</body>
</html>
