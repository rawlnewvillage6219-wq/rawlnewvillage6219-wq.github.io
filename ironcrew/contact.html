<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iron Crew | Contact</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <a class="navbar-brand font-weight-bold" href="index.html">IRON CREW</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav ml-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="programs.html">Programs</a></li>
        <li class="nav-item"><a class="nav-link" href="workouts.html">Workouts</a></li>
        <li class="nav-item"><a class="nav-link" href="nutrition.html">Nutrition</a></li>
        <li class="nav-item active"><a class="nav-link" href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <header class="page-banner text-center text-white py-5">
    <div class="container">
      <h1>Contact Iron Crew</h1>
      <p>Send us a message to get started.</p>
    </div>
  </header>

  <section class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card shadow p-4">
          <h2 class="mb-4">Contact Form</h2>

          <form id="contactForm" onsubmit="return validateForm()">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" class="form-control" id="name" placeholder="Enter your name">
            </div>

            <div class="form-group">
              <label for="email">Email</label>
              <input type="text" class="form-control" id="email" placeholder="Enter your email">
            </div>

            <div class="form-group">
              <label for="goal">Fitness Goal</label>
              <select class="form-control" id="goal">
                <option value="">Select a goal</option>
                <option value="Build Muscle">Build Muscle</option>
                <option value="Get Stronger">Get Stronger</option>
                <option value="Lose Fat">Lose Fat</option>
              </select>
            </div>

            <div class="form-group">
              <label>Training Experience</label><br>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="experience" id="beginner" value="Beginner">
                <label class="form-check-label" for="beginner">Beginner</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="experience" id="intermediate" value="Intermediate">
                <label class="form-check-label" for="intermediate">Intermediate</label>
              </div>
            </div>

            <div class="form-group">
              <label for="message">Message</label>
              <textarea class="form-control" id="message" rows="4" placeholder="Enter your message"></textarea>
            </div>

            <button type="submit" class="btn btn-warning">Submit</button>
            <p id="formMessage" class="mt-3 font-weight-bold"></p>
          </form>
        </div>
      </div>
    </div>
  </section>

  <footer class="bg-dark text-white text-center py-3">
    <p class="mb-0">&copy; 2026 Iron Crew</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
