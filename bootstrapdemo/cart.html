<!DOCTYPE html>
<html>
<head>
    <title>Magick Shop</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="item.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="updateCheckout(); displayCart()">
    <div class="jumbotron text-center banner">
        <h1>Magick Shop McAllen</h1>
        <p>The best magick shop in the Valley!</p>
    </div>

    <!--navbar-->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow fixed-top">
        <a id="cart-link" class="navbar-brand" href="cart.html">Checkout (0)</a>

        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#collapsibleNavbar" aria-controls="collapsibleNavbar" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="collapsibleNavbar">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="cart.html">Cart</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Shop</a>
                </li>
            </ul>
        </div>
    </nav>

    <!--stuff for the cart-->
    <div class="container">
        <div id="cart"></div>
        <div id="total"></div>
        <input class="btn btn-danger" type="button" value="Delete All" onclick="sessionStorage.clear(); displayCart(); updateCheckout();">
    </div>
</body>
</html>
